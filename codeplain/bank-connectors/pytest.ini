[pytest]
# `python -m pytest -q` at the bank-connectors root collects only the canonical
# generated package + unit tests under build/. The Codeplain build also emits
# verbatim duplicate trees (plain_modules/, conformance_tests/) and a separate
# conformance suite (build_conformance_tests/) whose test modules import sibling
# packages via run_conformance_tests_python.sh, not a flat pytest run. Collecting
# them all at once produces duplicate-basename / unresolved-import collection
# errors, so they are scoped out here. The conformance suite is exercised via
# scripts/run_conformance_tests_python.sh (and tests/test_codeplain_submission.py).
testpaths = build
norecursedirs =
    plain_modules
    conformance_tests
    build_conformance_tests
    dist
    dist_conformance_tests
    *.egg
    .git
    __pycache__
