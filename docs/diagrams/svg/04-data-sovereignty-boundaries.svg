<svg xmlns="http://www.w3.org/2000/svg" width="1325" height="800" viewBox="10 0 1325 800" role="img" aria-labelledby="title">
  <title id="title">data sovereignty boundaries</title>
  <defs><marker id="arrow-b8860b" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M 0 0 L 10 5 L 0 10 z" fill="#b8860b" /></marker></defs>
  <rect x="10" y="0" width="1325" height="800" fill="#ffffff" />
  <text x="40" y="59.92" fill="#1d2733" font-family="Virgil, 'Segoe Print', 'Bradley Hand', 'Comic Sans MS', cursive, sans-serif" font-size="34" text-anchor="start"><tspan x="40" dy="0">Data Sovereignty Boundaries</tspan></text>
  <text x="40" y="89.84" fill="#526170" font-family="Virgil, 'Segoe Print', 'Bradley Hand', 'Comic Sans MS', cursive, sans-serif" font-size="18" text-anchor="start"><tspan x="40" dy="0">What stays local and what is allowed to cross each boundary.</tspan></text>
  <rect x="45" y="135" width="360" height="460" rx="18" fill="none" stroke="#1f77b4" stroke-width="2" stroke-dasharray="10 8" />
  <text x="59" y="160.84" fill="#1f77b4" font-family="Virgil, 'Segoe Print', 'Bradley Hand', 'Comic Sans MS', cursive, sans-serif" font-size="18" text-anchor="start"><tspan x="59" dy="0">Device boundary</tspan></text>
  <rect x="455" y="135" width="420" height="460" rx="18" fill="none" stroke="#2ca02c" stroke-width="2" stroke-dasharray="10 8" />
  <text x="469" y="160.84" fill="#2ca02c" font-family="Virgil, 'Segoe Print', 'Bradley Hand', 'Comic Sans MS', cursive, sans-serif" font-size="18" text-anchor="start"><tspan x="469" dy="0">Bank tenancy boundary</tspan></text>
  <rect x="925" y="135" width="380" height="460" rx="18" fill="none" stroke="#9467bd" stroke-width="2" stroke-dasharray="10 8" />
  <text x="939" y="160.84" fill="#9467bd" font-family="Virgil, 'Segoe Print', 'Bradley Hand', 'Comic Sans MS', cursive, sans-serif" font-size="18" text-anchor="start"><tspan x="939" dy="0">Federation boundary</tspan></text>
  <rect x="80" y="200" width="290" height="146.371" rx="18" fill="#e8f2fb" stroke="#1f77b4" stroke-width="2" />
  <text x="96" y="231.6" fill="#1d2733" font-family="Virgil, 'Segoe Print', 'Bradley Hand', 'Comic Sans MS', cursive, sans-serif" font-size="20" text-anchor="start"><tspan x="96" dy="0">Stays on device</tspan><tspan x="96" dy="24">Behavioural events</tspan><tspan x="96" dy="24">Session signals</tspan><tspan x="96" dy="24">User baseline</tspan><tspan x="96" dy="24">Raw device labels</tspan></text>
  <rect x="79.875" y="390" width="290" height="126.609" rx="18" fill="#fff7d7" stroke="#b8860b" stroke-width="2" />
  <text x="96" y="421.6" fill="#1d2733" font-family="Virgil, 'Segoe Print', 'Bradley Hand', 'Comic Sans MS', cursive, sans-serif" font-size="20" text-anchor="start"><tspan x="96" dy="0">Can cross upward</tspan><tspan x="96" dy="24">DP-protected device update</tspan><tspan x="96" dy="24">No customer identifier</tspan><tspan x="96" dy="24">No raw event stream</tspan></text>
  <rect x="495" y="190" width="340" height="165.977" rx="18" fill="#e9f7ef" stroke="#2ca02c" stroke-width="2" />
  <text x="511" y="221.6" fill="#1d2733" font-family="Virgil, 'Segoe Print', 'Bradley Hand', 'Comic Sans MS', cursive, sans-serif" font-size="20" text-anchor="start"><tspan x="511" dy="0">Stays inside bank</tspan><tspan x="511" dy="24">Payment stream</tspan><tspan x="511" dy="24">Warehouse rows</tspan><tspan x="511" dy="24">ISO 20022 messages</tspan><tspan x="511" dy="24">Connector feature arrays</tspan><tspan x="511" dy="24">Analyst labels</tspan></text>
  <rect x="495" y="385" width="340" height="152.266" rx="18" fill="#fff7d7" stroke="#b8860b" stroke-width="2" />
  <text x="511" y="416.6" fill="#1d2733" font-family="Virgil, 'Segoe Print', 'Bradley Hand', 'Comic Sans MS', cursive, sans-serif" font-size="20" text-anchor="start"><tspan x="511" dy="0">Can cross upward</tspan><tspan x="511" dy="24">DP model delta</tspan><tspan x="511" dy="24">Local metrics</tspan><tspan x="511" dy="24">TEE/software attestation</tspan><tspan x="511" dy="24">Signed member identity</tspan></text>
  <rect x="965" y="190" width="300" height="150.57" rx="18" fill="#f1ebf7" stroke="#9467bd" stroke-width="2" />
  <text x="981.121" y="221.475" fill="#1d2733" font-family="Virgil, 'Segoe Print', 'Bradley Hand', 'Comic Sans MS', cursive, sans-serif" font-size="20" text-anchor="start"><tspan x="981.121" dy="0">Control plane sees</tspan><tspan x="981.121" dy="24">Round metadata</tspan><tspan x="981.121" dy="24">Model versions</tspan><tspan x="981.121" dy="24">Contributors/rejected</tspan><tspan x="981.121" dy="24">Aggregate metrics</tspan></text>
  <rect x="965" y="385" width="300" height="143.379" rx="18" fill="#fdeaea" stroke="#d62728" stroke-width="2" />
  <text x="981" y="416.865" fill="#1d2733" font-family="Virgil, 'Segoe Print', 'Bradley Hand', 'Comic Sans MS', cursive, sans-serif" font-size="20.301" text-anchor="start"><tspan x="981" dy="0">Control plane never sees</tspan><tspan x="981" dy="24.361">Raw customer data</tspan><tspan x="981" dy="24.361">Raw bank features</tspan><tspan x="981" dy="24.361">Per-device gradients</tspan><tspan x="981" dy="24.361">Cross-bank records</tspan></text>
  <polyline points="370,440 495,440" fill="none" stroke="#b8860b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-b8860b)" />
  <text x="432.5" y="424.32" fill="#b8860b" font-family="Virgil, 'Segoe Print', 'Bradley Hand', 'Comic Sans MS', cursive, sans-serif" font-size="14" text-anchor="middle"><tspan x="432.5" dy="0">DP aggregate</tspan></text>
  <polyline points="835,445 965,445" fill="none" stroke="#b8860b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-b8860b)" />
  <text x="900" y="429.32" fill="#b8860b" font-family="Virgil, 'Segoe Print', 'Bradley Hand', 'Comic Sans MS', cursive, sans-serif" font-size="14" text-anchor="middle"><tspan x="900" dy="0">delta + attestation</tspan></text>
  <rect x="280" y="650" width="770" height="120" rx="18" fill="#f5f7fa" stroke="#1d2733" stroke-width="2" />
  <text x="665" y="683.36" fill="#1d2733" font-family="Virgil, 'Segoe Print', 'Bradley Hand', 'Comic Sans MS', cursive, sans-serif" font-size="22" text-anchor="middle"><tspan x="665" dy="0">Invariant surfaced in the console</tspan><tspan x="665" dy="26.4">customerRecordsTransmitted = 0</tspan><tspan x="665" dy="26.4">Only model deltas, signed attestations, and control messages cross the trust boundary.</tspan></text>
</svg>
